name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check tag matches manifest version
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$GITHUB_REF_NAME" != "$manifest_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $manifest_version."
            exit 1
          fi

      - name: Run checks
        run: npm run check

      - name: Generate release asset attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME."
